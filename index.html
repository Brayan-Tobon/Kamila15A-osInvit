<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Mis 15 - Maria Kamila Tobon</title>

<!-- FUENTES -->
<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Playfair+Display:wght@400;600&family=Montserrat:wght@300;400&display=swap" rel="stylesheet">

<style>

/* ===== VARIABLES ===== */
:root{
--gold:#d4af37;
--white:#fff;
}

/* ===== RESET ===== */
*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:'Montserrat',sans-serif;
background:#000;
color:white;
overflow:hidden;
}

/* ===================================================== */
/* ================== INTRO ============================= */
/* ===================================================== */

.intro{
position:fixed;
inset:0;
background:url('images/intro-bg.png') center/cover no-repeat;
display:flex;
align-items:center;
justify-content:center;
z-index:999;
}

/* overlay */
.intro::before{
content:"";
position:absolute;
inset:0;
background:rgba(0,0,0,0.6);
}

/* contenido */
.intro-content{
position:relative;
z-index:2;
text-align:center;
padding:20px;
}

/* nombre */
.intro h1{
font-family:'Great Vibes',cursive;
font-size:3.5rem;
text-shadow:0 0 25px rgba(212,175,55,0.8);
}

/* subtitulo */
.subtitle{
margin-top:10px;
opacity:0.8;
font-size:1rem;
}

/* botón */
.intro button{
margin-top:25px;
padding:14px 40px;
border-radius:50px;
border:2px solid var(--gold);
background:rgba(0,0,0,0.4);
color:white;
cursor:pointer;
transition:all .3s ease;
}

.intro button:hover{
background:var(--gold);
color:black;
transform:scale(1.05);
}

/* ===================================================== */
/* ================= CONTENIDO ========================== */
/* ===================================================== */

#contenido{
display:none;
min-height:100vh;
display:flex;
align-items:center;
justify-content:center;
}

/* ===================================================== */
/* ================= RESPONSIVE ========================= */
/* ===================================================== */

@media(max-width:768px){
.intro h1{
font-size:2.5rem;
}
}

</style>
</head>

<body>

<!-- ================= INTRO ================= -->
<section class="intro" id="intro">
    <div class="intro-content">
        <h1>Maria Kamila Tobon</h1>
        <p class="subtitle">Una noche mágica está por comenzar ✨</p>
        <button onclick="abrirInvitacion()">Abrir Invitación</button>
    </div>
</section>

<!-- ================= CONTENIDO ================= -->
<section id="contenido">
    <h2 style="font-family:Playfair Display;">
        Aquí sigue la invitación 👇
    </h2>
</section>

<!-- ================= SCRIPT ================= -->
<script>

function abrirInvitacion(){

const intro = document.getElementById("intro");
const contenido = document.getElementById("contenido");

/* animación */
intro.style.opacity = "0";
intro.style.transition = "0.8s";

setTimeout(()=>{
intro.style.display = "none";
contenido.style.display = "flex";
document.body.style.overflow = "auto";
},800);

}

</script>

</body>
</html>
