<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Mis 15 - Maria Kamila Tobon</title>

<!-- FUENTES -->
<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Playfair+Display:wght@400;600&family=Montserrat:wght@300;400&display=swap" rel="stylesheet">

<style>

/* ===== VARIABLES ===== */
:root{
--gold:#d4af37;
--white:#fff;
}

/* ===== RESET ===== */
*{margin:0;padding:0;box-sizing:border-box;}

html{scroll-behavior:smooth;}

body{
font-family:'Montserrat',sans-serif;
background:#000;
color:white;
overflow:hidden;
}

/* ===================================================== */
/* ================== INTRO ============================= */
/* ===================================================== */

.intro{
position:fixed;
inset:0;
background:url('images/intro-bg.png') center/cover no-repeat;
display:flex;
align-items:center;
justify-content:center;
z-index:999;
}

.intro::before{
content:"";
position:absolute;
inset:0;
background:rgba(0,0,0,0.6);
}

.intro-content{
position:relative;
z-index:2;
text-align:center;
}

.intro h1{
font-family:'Great Vibes',cursive;
font-size:3.5rem;
text-shadow:0 0 25px rgba(212,175,55,0.8);
}

.intro p{
margin-top:10px;
opacity:0.8;
}

.intro button{
margin-top:25px;
padding:14px 40px;
border-radius:50px;
border:2px solid var(--gold);
background:transparent;
color:white;
cursor:pointer;
transition:.3s;
}

.intro button:hover{
background:var(--gold);
color:black;
}

/* ===================================================== */
/* ================== CONTENIDO ========================= */
/* ===================================================== */

#contenido{
display:none;
}

/* ===================================================== */
/* ================== HERO (PORTADA) ==================== */
/* ===================================================== */

.hero{
position:relative;
height:100vh;
display:flex;
align-items:center;
justify-content:center;
overflow:hidden;
}

/* imagen */
.hero-img{
position:absolute;
width:100%;
height:100%;
object-fit:cover;
top:0;
left:0;
}

/* overlay */
.hero::before{
content:"";
position:absolute;
inset:0;
background:linear-gradient(
rgba(0,0,0,0.6),
rgba(0,0,0,0.7)
);
}

/* contenido */
.hero-content{
position:relative;
z-index:2;
text-align:center;
max-width:600px;
padding:20px;
animation:fadeUp 1.2s ease;
}

/* textos */
.hero h2{
letter-spacing:3px;
font-weight:300;
margin-bottom:10px;
}

.hero h1{
font-family:'Great Vibes',cursive;
font-size:3.5rem;
text-shadow:0 0 20px rgba(212,175,55,0.6);
}

.hero p{
margin-top:15px;
line-height:1.6;
opacity:0.9;
}

/* botón */
.hero .btn{
margin-top:25px;
padding:12px 30px;
border:1px solid var(--gold);
border-radius:30px;
background:transparent;
color:white;
cursor:pointer;
transition:.3s;
}

.hero .btn:hover{
background:var(--gold);
color:black;
}

/* animación */
@keyframes fadeUp{
from{
opacity:0;
transform:translateY(40px);
}
to{
opacity:1;
transform:translateY(0);
}
}

/* ===================================================== */
/* ================= RESPONSIVE ========================= */
/* ===================================================== */

@media(max-width:768px){

.intro h1{
font-size:2.5rem;
}

.hero h1{
font-size:2.5rem;
}

.hero p{
font-size:0.95rem;
}

}

</style>
</head>

<body>

<!-- ================= INTRO ================= -->
<section class="intro" id="intro">
    <div class="intro-content">
        <h1>Maria Kamila Tobon</h1>
        <p>Una noche mágica está por comenzar ✨</p>
        <button onclick="abrirInvitacion()">Abrir Invitación</button>
    </div>
</section>

<!-- ================= CONTENIDO ================= -->
<div id="contenido">

<!-- ================= HERO ================= -->
<section class="hero">
    <!-- CAMBIA ESTA IMAGEN -->
    <img src="images/foto1.jpg" class="hero-img">

    <div class="hero-content">
        <h2>Mis 15 años</h2>
        <h1>Maria Kamila Tobon</h1>
        <p>
        Hoy comienza una nueva etapa llena de sueños,
        ilusión y momentos inolvidables.
        </p>

        <button class="btn" onclick="scrollNext()">Descubrir</button>
    </div>
</section>

</div>

<!-- ================= SCRIPT ================= -->
<script>

function abrirInvitacion(){

const intro = document.getElementById("intro");
const contenido = document.getElementById("contenido");

intro.style.opacity = "0";
intro.style.transition = "0.8s";

setTimeout(()=>{
intro.style.display = "none";
contenido.style.display = "block";
document.body.style.overflow = "auto";
},800);

}

/* scroll */
function scrollNext(){
window.scrollBy({
top: window.innerHeight,
behavior: 'smooth'
});
}

</script>

</body>
</html>
