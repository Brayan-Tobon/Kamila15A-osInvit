<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mis 15 - Maria Kamila Tobon</title>

<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Playfair+Display&family=Montserrat&display=swap" rel="stylesheet">

<style>
:root{
--gold:#d4af37;
--pink:#f3d6df;
}

*{margin:0;padding:0;box-sizing:border-box}

body{
font-family:'Montserrat',sans-serif;
background:#000;
color:white;
overflow:hidden;
}

/* INTRO */
.intro{
position:fixed;
inset:0;
background:url('images/intro-bg.png') center/cover no-repeat;
display:flex;
justify-content:center;
align-items:center;
z-index:999;
text-align:center;
}

.intro::before{
content:"";
position:absolute;
inset:0;
background:rgba(0,0,0,0.6);
}

.intro-content{
position:relative;
z-index:2;
}

.intro h1{
font-family:'Great Vibes',cursive;
font-size:3.5rem;
text-shadow:0 0 25px rgba(212,175,55,0.8);
}

.intro button{
margin-top:30px;
padding:14px 35px;
border-radius:50px;
border:2px solid var(--gold);
background:transparent;
color:white;
cursor:pointer;
}

.intro button:hover{
background:var(--gold);
color:black;
}

/* CONTENIDO */
#contenido{
display:none;
}

/* HERO */
.hero{
position:relative;
height:100vh;
display:flex;
align-items:center;
justify-content:center;
}

.hero-img{
position:absolute;
width:100%;
height:100%;
object-fit:cover;
}

.hero::before{
content:"";
position:absolute;
inset:0;
background:rgba(0,0,0,0.5);
}

.hero-content{
position:relative;
z-index:2;
text-align:center;
}

.hero h1{
font-family:'Great Vibes',cursive;
font-size:3rem;
}

/* SECCIONES */
section{
min-height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
padding:40px;
}

.title{
font-family:'Playfair Display';
font-size:2rem;
margin-bottom:10px;
}

.box{
border:1px solid var(--gold);
padding:20px;
border-radius:10px;
}

/* GALERIA */
.gallery{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:10px;
width:100%;
max-width:900px;
}

.gallery img{
width:100%;
height:250px;
object-fit:cover;
}

/* RSVP */
.rsvp{
background:var(--pink);
color:black;
}

/* WHATSAPP */
.whatsapp{
position:fixed;
bottom:20px;
right:20px;
background:#25D366;
padding:15px;
border-radius:50%;
}
</style>
</head>

<body>

<!-- INTRO -->
<div class="intro" id="intro">
<div class="intro-content">
<h1>Maria Kamila Tobon</h1>
<button onclick="start()">Abrir Invitación</button>
</div>
</div>

<!-- AUDIO -->
<audio id="music" loop>
<source src="music/Photograph.mp3" type="audio/mpeg">
</audio>

<!-- CONTENIDO -->
<div id="contenido">

<section class="hero">
<img src="images/foto1.jpg" class="hero-img">
<div class="hero-content">
<p>Mis 15 años</p>
<h1>Maria Kamila Tobon</h1>
</div>
</section>

<section>
<h2 class="title">Fecha</h2>
<div class="box">
<p>01 de Mayo 2026</p>
<p>7:00 PM</p>
</div>
</section>

<section>
<h2 class="title">Galería</h2>
<div class="gallery">
<img src="images/foto1.jpg">
<img src="images/foto5.jpg">
<img src="images/foto8.jpg">
<img src="images/foto12.jpg">
<img src="images/foto16.jpg">
<img src="images/foto18.jpg">
</div>
</section>

<section class="rsvp">
<h2 class="title">Confirmar</h2>
<a href="https://wa.me/573114802534" target="_blank">Confirmar asistencia</a>
</section>

</div>

<a class="whatsapp" href="https://wa.me/573114802534">💬</a>

<script>
function start(){
document.getElementById("intro").style.display="none";
document.getElementById("contenido").style.display="block";
document.body.style.overflow="auto";
document.getElementById("music").play();
}
</script>

</body>
</html>
