<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Mis 15 - Maria Kamila Tobon</title>

<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Playfair+Display:wght@400;600&family=Montserrat:wght@300;400&display=swap" rel="stylesheet">

<style>

/* ===== VARIABLES ===== */
:root{
--gold:#d4af37;
--white:#fff;
}

/* ===== RESET ===== */
*{margin:0;padding:0;box-sizing:border-box;}

html{scroll-behavior:smooth;}

body{
font-family:'Montserrat',sans-serif;
background:#000;
color:white;
overflow:hidden;
}

/* ================= INTRO ================= */

.intro{
position:fixed;
inset:0;
background:url('images/intro-bg.png') center/cover no-repeat;
display:flex;
align-items:center;
justify-content:center;
z-index:999;
}

.intro::before{
content:"";
position:absolute;
inset:0;
background:rgba(0,0,0,0.6);
}

.intro-content{
position:relative;
z-index:2;
text-align:center;
}

.intro h1{
font-family:'Great Vibes',cursive;
font-size:3.5rem;
text-shadow:0 0 25px rgba(212,175,55,0.8);
}

.intro button{
margin-top:25px;
padding:14px 40px;
border-radius:50px;
border:2px solid var(--gold);
background:transparent;
color:white;
cursor:pointer;
}

/* ================= CONTENIDO ================= */

#contenido{
display:none;
}

/* ================= HERO ================= */

.hero{
position:relative;
height:100vh;
display:flex;
align-items:center;
justify-content:center;
}

.hero-img{
position:absolute;
width:100%;
height:100%;
object-fit:cover;
object-position:center top;
}

.hero::before{
content:"";
position:absolute;
inset:0;
background:linear-gradient(rgba(0,0,0,0.5),rgba(0,0,0,0.7));
}

.hero-content{
position:relative;
z-index:2;
text-align:center;
max-width:600px;
padding:20px;
}

.hero h2{
letter-spacing:3px;
font-weight:300;
margin-bottom:10px;
}

.hero h1{
font-family:'Great Vibes';
font-size:3.2rem;
text-shadow:0 0 20px rgba(212,175,55,0.6);
}

.hero p{
margin-top:15px;
line-height:1.6;
opacity:0.9;
}

.hero .btn{
margin-top:25px;
padding:12px 30px;
border:1px solid var(--gold);
border-radius:30px;
background:transparent;
color:white;
cursor:pointer;
}

/* ================= FECHA ================= */

.fecha{
min-height:100vh;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
text-align:center;
position:relative;
overflow:hidden;
}

/* estrellas */
.fecha::before{
content:"";
position:absolute;
inset:0;
background-image:radial-gradient(var(--gold) 1px, transparent 1px);
background-size:50px 50px;
opacity:0.08;
}

/* decoración líneas */
.decor-line{
width:100px;
height:1px;
background:var(--gold);
margin:20px auto;
position:relative;
}

.decor-line::after{
content:"";
position:absolute;
left:50%;
top:-4px;
width:8px;
height:8px;
background:var(--gold);
border-radius:50%;
transform:translateX(-50%);
}

/* tarjeta */
.fecha-box{
border:1px solid var(--gold);
padding:35px 50px;
border-radius:15px;
margin-bottom:40px;
background:rgba(255,255,255,0.02);
box-shadow:0 0 30px rgba(212,175,55,0.1);
}

.fecha h2{
font-family:'Playfair Display';
font-size:2.2rem;
margin-bottom:10px;
}

/* ================= COUNTDOWN ================= */

.countdown-title{
font-family:'Great Vibes';
font-size:2.5rem;
color:var(--gold);
margin-bottom:20px;
}

.countdown{
display:flex;
gap:15px;
flex-wrap:wrap;
justify-content:center;
}

.count-box{
border:1px solid var(--gold);
padding:15px 20px;
min-width:80px;
border-radius:10px;
background:rgba(255,255,255,0.02);
}

.count-box span{
font-size:1.8rem;
display:block;
}

.count-box small{
opacity:0.7;
}

/* ================= RESPONSIVE ================= */

@media(max-width:768px){
.hero h1{font-size:2.3rem;}
}

</style>
</head>

<body>

<!-- INTRO -->
<section class="intro" id="intro">
<div class="intro-content">
<h1>Maria Kamila Tobon</h1>
<button onclick="abrirInvitacion()">Abrir Invitación</button>
</div>
</section>

<!-- CONTENIDO -->
<div id="contenido">

<!-- HERO -->
<section class="hero">
<img src="images/portada.jpeg" class="hero-img">

<div class="hero-content">
<h2>Mis 15 años</h2>
<h1>Maria Kamila Tobon</h1>

<p>
Hoy comienza una nueva etapa llena de sueños,
ilusión y momentos inolvidables.
</p>

<button class="btn" onclick="scrollNext()">Descubrir</button>
</div>
</section>

<!-- FECHA -->
<section class="fecha">

<div class="decor-line"></div>

<div class="fecha-box">
<h2>Fecha del evento</h2>
<p>02 de Mayo 2026</p>
<p>7:00 PM</p>
</div>

<div class="decor-line"></div>

<h2 class="countdown-title">Falta</h2>

<div class="countdown">
<div class="count-box"><span id="d">0</span><small>días</small></div>
<div class="count-box"><span id="h">0</span><small>hs</small></div>
<div class="count-box"><span id="m">0</span><small>min</small></div>
<div class="count-box"><span id="s">0</span><small>seg</small></div>
</div>

</section>

</div>

<script>

function abrirInvitacion(){
document.getElementById("intro").style.display="none";
document.getElementById("contenido").style.display="block";
document.body.style.overflow="auto";
}

function scrollNext(){
window.scrollBy({
top: window.innerHeight,
behavior: 'smooth'
});
}

/* countdown */
const fecha = new Date("2026-05-02T19:00:00");

setInterval(()=>{
let ahora = new Date();
let diff = fecha - ahora;

let d = Math.floor(diff / (1000*60*60*24));
let h = Math.floor(diff / (1000*60*60) % 24);
let m = Math.floor(diff / (1000*60) % 60);
let s = Math.floor(diff / 1000 % 60);

document.getElementById("d").innerText = d;
document.getElementById("h").innerText = h;
document.getElementById("m").innerText = m;
document.getElementById("s").innerText = s;

},1000);

</script>

</body>
</html>
