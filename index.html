<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Mis 15 - Maria Kamila Tobon</title>

<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Playfair+Display:wght@400;600&family=Montserrat:wght@300;400&display=swap" rel="stylesheet">

<style>

/* ===== VARIABLES ===== */
:root{
--gold:#d4af37;
--white:#fff;
}

/* ===== RESET ===== */
*{margin:0;padding:0;box-sizing:border-box;}

html{scroll-behavior:smooth;}

body{
font-family:'Montserrat',sans-serif;
background:#000;
color:white;
overflow:hidden;
}

/* ================= INTRO ================= */

.intro{
position:fixed;
inset:0;
background:url('images/intro-bg.png') center/cover no-repeat;
display:flex;
align-items:center;
justify-content:center;
z-index:999;
}

.intro::before{
content:"";
position:absolute;
inset:0;
background:rgba(0,0,0,0.6);
}

.intro-content{
position:relative;
z-index:2;
text-align:center;
}

.intro h1{
font-family:'Great Vibes';
font-size:3.5rem;
text-shadow:0 0 25px rgba(212,175,55,0.8);
}

.intro button{
margin-top:25px;
padding:14px 40px;
border-radius:50px;
border:2px solid var(--gold);
background:transparent;
color:white;
cursor:pointer;
}

/* ================= CONTENIDO ================= */

#contenido{
display:none;
}

/* ================= HERO ================= */

.hero{
position:relative;
height:100vh;
display:flex;
align-items:center;
justify-content:center;
}

.hero-img{
position:absolute;
width:100%;
height:100%;
object-fit:cover;
object-position:center top;
}

.hero::before{
content:"";
position:absolute;
inset:0;
background:rgba(0,0,0,0.6);
}

.hero-content{
position:relative;
z-index:2;
text-align:center;
max-width:600px;
}

.hero h1{
font-family:'Great Vibes';
font-size:3rem;
}

/* ================= FECHA ================= */

.fecha{
min-height:100vh;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
text-align:center;
}

/* ================= LUGAR ================= */

.lugar{
min-height:100vh;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
text-align:center;
padding:40px 20px;
background:#050505;
position:relative;
}

/* fondo estrellas */
.lugar::before{
content:"";
position:absolute;
inset:0;
background-image:radial-gradient(var(--gold) 1px, transparent 1px);
background-size:60px 60px;
opacity:0.05;
}

/* título */
.lugar h2{
font-family:'Playfair Display';
font-size:2.2rem;
margin-bottom:15px;
}

/* nombre lugar */
.lugar .nombre{
font-size:1.2rem;
margin-bottom:25px;
opacity:0.9;
}

/* dirección */
.lugar .direccion{
font-size:1rem;
opacity:0.7;
margin-bottom:25px;
}

/* botones */
.btn{
padding:12px 28px;
border-radius:30px;
border:1px solid var(--gold);
background:transparent;
color:white;
cursor:pointer;
margin:10px;
transition:.3s;
display:inline-block;
text-decoration:none;
}

.btn:hover{
background:var(--gold);
color:black;
}

/* línea decorativa */
.decor{
width:80px;
height:1px;
background:var(--gold);
margin:25px auto;
position:relative;
}

.decor::after{
content:"";
width:6px;
height:6px;
background:var(--gold);
border-radius:50%;
position:absolute;
left:50%;
top:-3px;
transform:translateX(-50%);
}

/* ================= RESPONSIVE ================= */

@media(max-width:768px){
.hero h1{font-size:2.3rem;}
}

</style>
</head>

<body>

<!-- INTRO -->
<section class="intro" id="intro">
<div class="intro-content">
<h1>Maria Kamila Tobon</h1>
<button onclick="abrirInvitacion()">Abrir Invitación</button>
</div>
</section>

<!-- CONTENIDO -->
<div id="contenido">

<!-- HERO -->
<section class="hero">
<img src="images/portada.jpeg" class="hero-img">

<div class="hero-content">
<h1>Maria Kamila Tobon</h1>
<p>Mis 15 años</p>
</div>
</section>

<!-- LUGAR -->
<section class="lugar">

<div class="decor"></div>

<h2>Lugar</h2>
<p class="nombre">Finca: Chinauta El Castillo</p>

<a class="btn" href="https://forms.gle/TU_LINK_AQUI" target="_blank">
Confirmar asistencia
</a>

<div class="decor"></div>

<h2>Dirección</h2>
<p class="direccion">
Km 67 #37-52, Entrada Villa Amparo
</p>

<a class="btn" href="https://www.google.com/maps?q=Chinauta+El+Castillo" target="_blank">
Ver ubicación
</a>

</section>

</div>

<script>

function abrirInvitacion(){
document.getElementById("intro").style.display="none";
document.getElementById("contenido").style.display="block";
document.body.style.overflow="auto";
}

</script>

</body>
</html>
