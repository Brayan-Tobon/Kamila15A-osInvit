<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mis 15 - Maria Kamila Tobon</title>

<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Playfair+Display:wght@400;600;700&family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet">

<style>
:root{
--gold:#d4af37;
--white:#fff;
}

*{margin:0;padding:0;box-sizing:border-box}

body{
font-family:'Montserrat',sans-serif;
background:#000;
color:white;
overflow:hidden;
}

/* INTRO PREMIUM */
.intro{
position:fixed;
inset:0;
background:url('images/intro-bg.jpg') center/cover no-repeat;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
z-index:999;
text-align:center;
}

/* overlay elegante */
.intro::before{
content:"";
position:absolute;
inset:0;
background:rgba(0,0,0,0.5);
}

/* contenido */
.intro-content{
position:relative;
z-index:2;
}

.intro h1{
font-family:'Great Vibes',cursive;
font-size:3.5rem;
text-shadow:0 0 25px rgba(212,175,55,0.8);
}

/* BOTÓN REDONDO PREMIUM */
.intro button{
margin-top:30px;
padding:15px 35px;
border-radius:50px;
border:2px solid var(--gold);
background:rgba(0,0,0,0.4);
color:white;
font-size:1rem;
cursor:pointer;
transition:all .4s ease;
backdrop-filter: blur(6px);
}

.intro button:hover{
background:var(--gold);
color:black;
transform:scale(1.05);
box-shadow:0 0 20px rgba(212,175,55,0.6);
}

/* OCULTAR SCROLL HASTA ABRIR */
body.open{
overflow:auto;
}
</style>
</head>

<body>

<!-- INTRO -->
<div class="intro" id="intro">
<div class="intro-content">
<h1>Maria Kamila Tobon</h1>
<button onclick="start()">Abrir Invitación</button>
</div>
</div>

<!-- CONTENIDO (SIMPLIFICADO POR AHORA) -->
<div id="contenido" style="display:none; height:200vh; display:flex; align-items:center; justify-content:center;">
<h2 style="font-family:Playfair Display;">Aquí va tu invitación</h2>
</div>

<script>
function start(){
const intro = document.getElementById("intro");
const contenido = document.getElementById("contenido");

// animación salida
intro.style.opacity = "0";
intro.style.transition = "1s";

setTimeout(()=>{
intro.style.display = "none";
contenido.style.display = "block";
document.body.classList.add("open");
},800);
}
</script>

</body>
</html>
